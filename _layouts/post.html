---
layout: html
---
<article id="" itemscope itemtype="https://schema.org/BlogPosting" itemid="{{ page.url | absolute_url }}"> <!-- TODO: @fedtti - Add URN as ID. -->
  <header>
    <h3 itemprop="headline">{{ page.title }}</h3>
    <p><time datetime="{{ page.date }}" itemprop="datePublished">{{ page.date | date: '' }}</time> by <span itemprop="author"><span itemprop="name"><a href="/about/" itemscope itemtype="https://schema.org/Person" itemprop="url">{{ site.author.full_name }}</a></span></span></p>
  </header>

  <section itemprop="articleBody">
    {{ content }}
  </section>
  <footer>
    <ul>
      <li>
        <i class="fa-brands fa-creative-commons" title="Creative Commons"></i>
      </li>
      <li><a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="license noopener noreferrer" itemprop="license">
        <i class="fa-brands fa-creative-commons-by" title="BY 4.0"></i>
      </a>
      </li>
    </ul>
  </footer>
</article>
